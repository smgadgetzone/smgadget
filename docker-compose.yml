version: '3.8'

services:
  backend:
    build: ./sm-gadgets-backend
    container_name: sm-gadgets-backend
    ports:
      - "5000:5000"
    env_file:
      - ./sm-gadgets-backend/.env
    environment:
      - PORT=5000
    restart: always

  frontend:
    build: ./sm-gadgets-frontend
    container_name: sm-gadgets-frontend
    ports:
      - "8080:8080"
    # Ensure backend is ready before starting frontend (optional, but good practice)
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:5000
