version: '3.8'

services:
  backend:
    build: ./sm-gadgets-backend
    container_name: sm-gadgets-backend
    ports:
      - "5000:5000"
    env_file:
      - ./sm-gadgets-backend/.env
    environment:
      - PORT=5000
    restart: always

  frontend:
    build: ./sm-gadgets-frontend
    container_name: sm-gadgets-frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend
    environment:
      # Tell Vite's server-side proxy where to forward /api requests (inside Docker network)
      # Do NOT set VITE_API_URL here - browser must use the Vite proxy at localhost:8080
      - VITE_PROXY_TARGET=http://backend:5000
